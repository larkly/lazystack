name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.0.5)"
        required: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Build
        working-directory: src
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          bin="lazystack-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-s -w -X main.version=${{ env.VERSION }}" -o "../${bin}" ./cmd/lazystack

      - uses: actions/upload-artifact@v4
        with:
          name: lazystack-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lazystack-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum lazystack-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            lazystack-*
            SHA256SUMS

      - name: Parse checksums
        id: shas
        run: |
          echo "darwin_arm64=$(grep darwin-arm64 SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(grep darwin-amd64 SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(grep linux-arm64 SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(grep linux-amd64 SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: larkly/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ env.VERSION }}",
              "sha256_darwin_arm64": "${{ steps.shas.outputs.darwin_arm64 }}",
              "sha256_darwin_amd64": "${{ steps.shas.outputs.darwin_amd64 }}",
              "sha256_linux_arm64": "${{ steps.shas.outputs.linux_arm64 }}",
              "sha256_linux_amd64": "${{ steps.shas.outputs.linux_amd64 }}"
            }
